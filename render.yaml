services:
  - type: web
    name: smart-trolley
    runtime: python
    # This installs your AI libraries and Flask
    buildCommand: pip install -r requirements.txt
    # We use 1 worker to save RAM and ensure the Cart data stays in sync
    startCommand: gunicorn server_app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0