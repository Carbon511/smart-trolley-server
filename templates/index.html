<!DOCTYPE html>
<html>
<head>
    <title>Smart Trolley Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .main { display: flex; gap: 20px; padding: 20px; }
        .video-feed { background: #000; border-radius: 15px; width: 640px; height: 480px; }
        .cart { background: #fff; padding: 20px; border-radius: 15px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .alert { color: red; font-weight: bold; margin-bottom: 10px; }
        .btn { padding: 10px 20px; background: #27ae60; color: white; border: none; cursor: pointer; width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🛒 Smart Trolley</h1>
    <div class="main">
        <div class="video-feed">
            <img src="/video_feed" width="640">
        </div>
        <div class="cart">
            <div id="alert" class="alert"></div>
            <h3>Your Items</h3>
            <ul id="item-list"></ul>
            <hr>
            <h4>Total: ₹<span id="total">0</span></h4>
            <input type="text" id="phone" placeholder="Phone Number" style="width:90%; margin-bottom:10px;">
            <button class="btn" onclick="pay()">Pay & Checkout</button>
            <button onclick="tare()" style="margin-top:10px; font-size:10px;">Tare Scale</button>
        </div>
    </div>

    <script>
        async function refresh() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('total').innerText = data.total;
            document.getElementById('alert').innerText = data.alert || "";
            document.getElementById('item-list').innerHTML = data.cart.map(i => `<li>${i.name} - ₹${i.price}</li>`).join('');
        }
        setInterval(refresh, 1000);

        function pay() {
            const amt = document.getElementById('total').innerText;
            if(amt == 0) return alert("Cart is empty");
            
            var options = {
                "key": "YOUR_RAZORPAY_KEY",
                "amount": amt * 100,
                "handler": function (response) {
                    fetch('/checkout', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({phone: document.getElementById('phone').value, payment_id: response.razorpay_payment_id})
                    }).then(() => alert("Payment Success! Bill sent to WhatsApp."));
                }
            };
            var rzp = new Razorpay(options); rzp.open();
        }

        function tare() { fetch('/api/tare', {method: 'POST'}); }
    </script>
</body>
</html>
